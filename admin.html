<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>TTM SHOP অ্যাডমিন প্যানেল</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .login-box button { background: #386f6e; color: white; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; }
        .admin-panel { display: none; max-width: 1400px; margin: 0 auto; }
        .header { background: #386f6e; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; }
        .btn { background: #ffb84d; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .tabs { margin: 20px 0; }
        .tab { background: white; border: none; padding: 10px 20px; margin: 0 5px; border-radius: 25px; cursor: pointer; }
        .tab.active { background: #386f6e; color: white; }
        .content { background: white; padding: 20px; border-radius: 15px; }
        .content > div { display: none; }
        .content > div.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn-primary { background: #386f6e; color: white; padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; }
        .msg { position: fixed; bottom: 20px; right: 20px; background: #386f6e; color: white; padding: 12px 24px; border-radius: 30px; display: none; }
        .msg.show { display: block; }
    </style>
</head>
<body>

<div id="loginPage" class="login-box">
    <h2>🔐 অ্যাডমিন লগইন</h2>
    <input type="password" id="password" placeholder="পাসওয়ার্ড">
    <button onclick="login()">লগইন</button>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="header"><h2>🛍️ TTM SHOP প্যানেল</h2><button class="btn" onclick="logout()">লগআউট</button></div>
    <div class="tabs"><button class="tab active" onclick="showTab('products')">📦 প্রোডাক্ট</button><button class="tab" onclick="showTab('hero')">🎨 হিরো</button><button class="tab" onclick="showTab('contact')">📞 যোগাযোগ</button><button class="tab" onclick="showTab('footer')">📋 ফুটার</button></div>
    <div class="content">
        <div id="productsTab" class="active">
            <h3>➕ প্রোডাক্ট যোগ</h3>
            <div class="form-group"><label>টাইটেল</label><input type="text" id="title"></div>
            <div class="form-group"><label>সংক্ষিপ্ত</label><input type="text" id="shortDesc"></div>
            <div class="form-group"><label>বিস্তারিত</label><textarea id="longDetails"></textarea></div>
            <div class="form-group"><label>দাম</label><input type="number" id="price"></div>
            <div class="form-group"><label>নিয়মিত দাম</label><input type="number" id="regularPrice"></div>
            <div class="form-group"><label>ছবি URL</label><input type="text" id="imageUrl"></div>
            <button class="btn-primary" onclick="addProduct()">➕ যোগ</button>
            <h3>⭐ বেস্ট সেলিং</h3>
            <table><thead><tr><th>ছবি</th><th>টাইটেল</th><th>দাম</th><th>ছাড়</th><th></th></tr></thead><tbody id="bestList"></tbody></table>
            <h3>📦 সব প্রোডাক্ট</h3>
            <table><thead><tr><th>ছবি</th><th>টাইটেল</th><th>দাম</th><th>ছাড়</th><th></th></tr></thead><tbody id="allList"></tbody></table>
        </div>
        <div id="heroTab"><div class="form-group"><label>হিরো টাইটেল</label><input type="text" id="heroTitle"></div><div class="form-group"><label>হিরো সাবটাইটেল</label><input type="text" id="heroSubtitle"></div><button class="btn-primary" onclick="updateHero()">আপডেট</button></div>
        <div id="contactTab"><div class="form-group"><label>হোয়াটসঅ্যাপ</label><input type="text" id="whatsapp"></div><div class="form-group"><label>মেসেঞ্জার</label><input type="text" id="messenger"></div><button class="btn-primary" onclick="updateContact()">আপডেট</button></div>
        <div id="footerTab"><div class="form-group"><label>কপিরাইট</label><input type="text" id="copyright"></div><div class="form-group"><label>সাপোর্ট</label><input type="text" id="support"></div><button class="btn-primary" onclick="updateFooter()">আপডেট</button></div>
    </div>
</div>
<div id="msg" class="msg"></div>

<script>
    const GITHUB_USERNAME = 'ttmshop';
    const REPO_NAME = 's';
    const GITHUB_TOKEN = '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';
    const ADMIN_PASSWORD = 'admin123';
    
    let websiteData = {
        heroTitle: "🛍️ TTM SHOP", heroSubtitle: "Premium Quality. Trusted Delivery",
        whatsappNumber: "8801234567890", messengerUsername: "yourpageusername",
        copyrightText: "© 2024 TTM SHOP.", supportNumber: "24/7",
        bestSellingProducts: [{ id: "bs1", title: "Full Stack", shortDesc: "Course", longDetails: "6 months", price: 990, regularPrice: 12000, icon: "🚀", bgColor: "#e0f0ed", imageUrl: "https://www.startech.com.bd/image/cache/catalog/smart-watch/oraimo/watch-4-plus/oraimo-watch-4-plus-01-500x500.webp" }],
        allProducts: [{ id: "p1", title: "Python", shortDesc: "Data Science", longDetails: "Learn", price: 3900, regularPrice: 8500, icon: "🐍", bgColor: "#f0f3e8", imageUrl: "" }]
    };
    
    function showMessage(msg) { let m = document.getElementById('msg'); m.innerText = msg; m.classList.add('show'); setTimeout(() => m.classList.remove('show'), 3000); }
    function saveLocal() { localStorage.setItem('ttm_data', JSON.stringify(websiteData)); }
    function loadLocal() { let s = localStorage.getItem('ttm_data'); if(s) websiteData = JSON.parse(s); renderTables(); loadForms(); }
    
    function renderTables() {
        let bestHtml = '', allHtml = '';
        websiteData.bestSellingProducts.forEach((p,i)=>{ bestHtml += `<tr><td>${p.imageUrl?'<img src="'+p.imageUrl+'" width="40">':p.icon}</td><td>${p.title}</td><td>${p.price}৳</td><td>${p.regularPrice>p.price?Math.round(((p.regularPrice-p.price)/p.regularPrice)*100)+'%':'-'}</td><td><button onclick="editBest(${i})">✏️</button> <button onclick="deleteBest(${i})">🗑️</button></td></tr>`; });
        websiteData.allProducts.forEach((p,i)=>{ allHtml += `<tr><td>${p.imageUrl?'<img src="'+p.imageUrl+'" width="40">':p.icon}</td><td>${p.title}</td><td>${p.price}৳</td><td>${p.regularPrice>p.price?Math.round(((p.regularPrice-p.price)/p.regularPrice)*100)+'%':'-'}</td><td><button onclick="editAll(${i})">✏️</button> <button onclick="deleteAll(${i})">🗑️</button></td></tr>`; });
        document.getElementById('bestList').innerHTML = bestHtml; document.getElementById('allList').innerHTML = allHtml;
    }
    
    function loadForms() {
        document.getElementById('heroTitle').value = websiteData.heroTitle; document.getElementById('heroSubtitle').value = websiteData.heroSubtitle;
        document.getElementById('whatsapp').value = websiteData.whatsappNumber; document.getElementById('messenger').value = websiteData.messengerUsername;
        document.getElementById('copyright').value = websiteData.copyrightText; document.getElementById('support').value = websiteData.supportNumber;
    }
    
    async function syncGit() {
        try {
            showMessage('⏳ আপডেট হচ্ছে...');
            let url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/index.html`;
            let res = await fetch(url, { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` } });
            if(!res.ok) throw new Error('ফাইল পাওয়া যায়নি');
            let data = await res.json();
            let html = atob(data.content);
            html = html.replace(/let bestSellingProducts = \[[\s\S]*?\];/, `let bestSellingProducts = ${JSON.stringify(websiteData.bestSellingProducts, null, 8)};`);
            html = html.replace(/let allProducts = \[[\s\S]*?\];/, `let allProducts = ${JSON.stringify(websiteData.allProducts, null, 8)};`);
            html = html.replace(/whatsappNumber: "[^"]*",/, `whatsappNumber: "${websiteData.whatsappNumber}",`);
            html = html.replace(/messengerUsername: "[^"]*",/, `messengerUsername: "${websiteData.messengerUsername}",`);
            html = html.replace(/copyrightText: "[^"]*",/, `copyrightText: "${websiteData.copyrightText}",`);
            html = html.replace(/supportNumber: "[^"]*",/, `supportNumber: "${websiteData.supportNumber}",`);
            html = html.replace(/heroTitle: "[^"]*",/, `heroTitle: "${websiteData.heroTitle}",`);
            html = html.replace(/heroSubtitle: "[^"]*",/, `heroSubtitle: "${websiteData.heroSubtitle}",`);
            let put = await fetch(url, { method: 'PUT', headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: 'অ্যাডমিন আপডেট', content: btoa(unescape(encodeURIComponent(html))), sha: data.sha }) });
            if(put.ok) showMessage('✅ সফল! 1-2 মিনিট পর আপডেট হবে'); else showMessage('❌ ব্যর্থ');
        } catch(e) { showMessage('❌ এরর: '+e.message); }
    }
    
    async function addProduct() {
        websiteData.allProducts.push({ id: Date.now().toString(), title: document.getElementById('title').value, shortDesc: document.getElementById('shortDesc').value, longDetails: document.getElementById('longDetails').value, price: parseInt(document.getElementById('price').value), regularPrice: parseInt(document.getElementById('regularPrice').value), icon: "🛍️", bgColor: "#f5faf9", imageUrl: document.getElementById('imageUrl').value });
        saveLocal(); renderTables(); await syncGit();
        document.getElementById('title').value = ''; document.getElementById('shortDesc').value = ''; document.getElementById('longDetails').value = ''; document.getElementById('price').value = ''; document.getElementById('regularPrice').value = ''; document.getElementById('imageUrl').value = '';
    }
    function editBest(i) { let p = websiteData.bestSellingProducts[i]; let t = prompt('টাইটেল:', p.title); if(t) p.title = t; let pr = prompt('দাম:', p.price); if(pr) p.price = parseInt(pr); saveLocal(); renderTables(); syncGit(); }
    function deleteBest(i) { if(confirm('ডিলিট?')){ websiteData.bestSellingProducts.splice(i,1); saveLocal(); renderTables(); syncGit(); } }
    function editAll(i) { let p = websiteData.allProducts[i]; let t = prompt('টাইটেল:', p.title); if(t) p.title = t; let pr = prompt('দাম:', p.price); if(pr) p.price = parseInt(pr); saveLocal(); renderTables(); syncGit(); }
    function deleteAll(i) { if(confirm('ডিলিট?')){ websiteData.allProducts.splice(i,1); saveLocal(); renderTables(); syncGit(); } }
    async function updateHero() { websiteData.heroTitle = document.getElementById('heroTitle').value; websiteData.heroSubtitle = document.getElementById('heroSubtitle').value; saveLocal(); await syncGit(); }
    async function updateContact() { websiteData.whatsappNumber = document.getElementById('whatsapp').value; websiteData.messengerUsername = document.getElementById('messenger').value; saveLocal(); await syncGit(); }
    async function updateFooter() { websiteData.copyrightText = document.getElementById('copyright').value; websiteData.supportNumber = document.getElementById('support').value; saveLocal(); await syncGit(); }
    
    function showTab(name) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.content>div').forEach(d=>d.classList.remove('active')); event.target.classList.add('active'); document.getElementById(name+'Tab').classList.add('active'); }
    function login() { if(document.getElementById('password').value === ADMIN_PASSWORD) { sessionStorage.setItem('admin','true'); document.getElementById('loginPage').style.display='none'; document.getElementById('adminPanel').style.display='block'; loadLocal(); } else showMessage('ভুল পাসওয়ার্ড!'); }
    function logout() { sessionStorage.removeItem('admin'); document.getElementById('loginPage').style.display='block'; document.getElementById('adminPanel').style.display='none'; }
    if(sessionStorage.getItem('admin')==='true') { document.getElementById('loginPage').style.display='none'; document.getElementById('adminPanel').style.display='block'; loadLocal(); }
</script>
</body>
</html>
